name: atlas-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm_overwrite:
        description: 'Type YES to override the drift gate (force-publish even if registry version >= package.json version). Use only for rollback scenarios.'
        required: false
        default: 'no'

permissions:
  contents: read

concurrency:
  # Differentiated by event_name so a workflow_dispatch publish run is not
  # cancelled by a subsequent push to main mid-flight.
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  # 5-platform NAPI matrix (Story 52.1). Atlas ships TWO NAPI artefacts:
  # `index.<suffix>.node` (atlas-query-napi) + `db.<suffix>.node` (atlas-db-napi).
  # Native runners only — no cross-compilation (cerebrum 2026-05-01).
  build-and-test:
    name: Build & test (${{ matrix.suffix }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    suffix: linux-x64-gnu,   target: x86_64-unknown-linux-gnu,  test: true }
          - { os: ubuntu-24.04-arm, suffix: linux-arm64-gnu, target: aarch64-unknown-linux-gnu, test: true }
          # darwin-x64 cross-compiled on arm64 (macos-13 scarce); build-only —
          # an x86_64 .node can't be loaded/tested on the arm64 runner.
          - { os: macos-14,         suffix: darwin-x64,      target: x86_64-apple-darwin,       test: false }
          - { os: macos-14,         suffix: darwin-arm64,    target: aarch64-apple-darwin,      test: true }
          - { os: windows-latest,   suffix: win32-x64-msvc,  target: x86_64-pc-windows-msvc,    test: true }
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with: { version: 9 }
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install

      - name: Build NAPI binaries (query + db)
        run: pnpm build:napi
        env:
          CARGO_BUILD_TARGET: ${{ matrix.target }}

      - name: TypeScript typecheck
        run: pnpm exec tsc --noEmit -p .

      - name: Vitest (unit only — integration runs in dedicated job with real DB)
        if: matrix.test
        run: pnpm exec vitest run tests/unit --reporter=json --outputFile=test-results.json
        shell: bash

      - name: Smoke gate — tests ran AND zero skipped (Linux/macOS)
        if: matrix.test && runner.os != 'Windows'
        run: |
          if [ ! -f test-results.json ]; then
            echo "::error::test-results.json not produced — pnpm test failed before writing"
            exit 1
          fi
          total=$(jq '[.testResults[].assertionResults[]] | length' test-results.json)
          if [ "$total" -eq 0 ]; then
            echo "::error::0 tests ran — test discovery is broken (check vitest include glob)"
            exit 1
          fi
          skipped=$(jq '[.testResults[].assertionResults[] | select(.status=="skipped")] | length' test-results.json)
          if [ "$skipped" -ne 0 ]; then
            echo "::error::$skipped tests skipped — check NAPI binary load path"
            exit 1
          fi
        shell: bash

      - name: Smoke gate — tests ran AND zero skipped (Windows)
        if: matrix.test && runner.os == 'Windows'
        run: |
          if (-not (Test-Path test-results.json)) {
            Write-Error "test-results.json not produced — pnpm test failed before writing"
            exit 1
          }
          $total = python -c "import json,sys; d=json.load(open(sys.argv[1])); print(sum(1 for r in d['testResults'] for a in r['assertionResults']))" test-results.json
          if ([int]$total -eq 0) {
            Write-Error "0 tests ran — test discovery is broken (check vitest include glob)"
            exit 1
          }
          $skipped = python -c "import json,sys; d=json.load(open(sys.argv[1])); print(sum(1 for r in d['testResults'] for a in r['assertionResults'] if a['status']=='skipped'))" test-results.json
          if ([int]$skipped -ne 0) {
            Write-Error "$skipped tests skipped — check NAPI binary load path"
            exit 1
          }
        shell: pwsh

      - name: Upload artefacts (query + db)
        uses: actions/upload-artifact@v7
        with:
          name: atlas-napi-${{ matrix.suffix }}
          path: |
            index.${{ matrix.suffix }}.node
            db.${{ matrix.suffix }}.node
          if-no-files-found: error

  # Cargo tests run once on linux-x64-gnu — Rust logic is platform-independent.
  cargo-tests:
    name: Cargo tests (linux-x64-gnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace

  # Integration tests against real Postgres + MySQL instances. Linux-only —
  # GHA service containers are Linux-only. Covers gaps the SQL-string-only
  # unit suite can't: transaction isolation, driver-specific decode quirks,
  # migration atomicity, relation preloads end-to-end.
  #
  # Gated on cargo-tests (Linux) only — NOT the full 5-platform build-and-test
  # matrix — so a flaky Windows/macOS runner cannot block PG+MySQL coverage.
  integration:
    name: Integration (real DB)
    runs-on: ubuntu-latest
    needs: cargo-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: atlas_test
          POSTGRES_DB: atlas_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: atlas_test
          MYSQL_DATABASE: atlas_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      ATLAS_TEST_PG_URL: postgres://postgres:atlas_test@localhost:5432/atlas_test
      ATLAS_TEST_MYSQL_URL: mysql://root:atlas_test@localhost:3306/atlas_test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with: { version: 9 }
      - uses: actions/setup-node@v6
        with: { node-version: '22' }
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install
      - name: Build NAPI binaries (query + db)
        run: pnpm build:napi
      - name: Integration tests
        run: pnpm test --run tests/integration

  # Publish job — gated on workflow_dispatch (manual maintainer trigger).
  # Requires NPM_TOKEN secret + a v<MAJOR>.<MINOR>.<PATCH> tag at HEAD matching
  # package.json. Drift gate refuses to overwrite a published version (or roll
  # back to an older one) without `confirm_overwrite=YES`.
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-and-test, cargo-tests]
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with: { version: 9 }
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Verify NPM_TOKEN secret
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "::error::NPM_TOKEN secret missing — set in repo settings before manual publish"
            exit 1
          fi

      - name: Tag-vs-package.json gate
        run: |
          tag=$(git tag --points-at HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$tag" ]; then
            echo "::error::HEAD has no v<MAJOR>.<MINOR>.<PATCH>-shaped tag — refuse to publish from an untagged commit"
            exit 1
          fi
          node_err=$(mktemp)
          if ! pkg_v=$(node -p "require('./package.json').version" 2>"$node_err"); then
            echo "::error::Failed to read package.json version: $(cat "$node_err")"
            rm -f "$node_err"; exit 1
          fi
          rm -f "$node_err"
          if [ -z "$pkg_v" ]; then
            echo "::error::package.json version field is empty"
            exit 1
          fi
          pkg_tag="v${pkg_v}"
          if [ "$tag" != "$pkg_tag" ]; then
            echo "::error::Tag $tag does not match package.json $pkg_tag — refuse to publish from a drifted tag"
            exit 1
          fi
          echo "Tag gate passed: $tag == $pkg_tag"

      - name: Drift fail-closed gate
        env:
          CONFIRM_OVERWRITE: ${{ inputs.confirm_overwrite }}
        run: |
          node_err=$(mktemp)
          if ! local_v=$(node -p "require('./package.json').version" 2>"$node_err"); then
            echo "::error::Failed to read package.json version: $(cat "$node_err")"
            rm -f "$node_err"; exit 1
          fi
          rm -f "$node_err"
          if [ -z "$local_v" ]; then
            echo "::error::package.json version field is empty"
            exit 1
          fi
          npm_err=$(mktemp)
          # `if` form so `set -e` (bash -e) does not abort the step when
          # `npm view` exits non-zero (e.g. E404 on a first publish) — a bare
          # assignment would die before `status=$?` and skip the E404 path.
          if npm_v=$(npm view --fetch-timeout=30000 @c9up/atlas version 2>"$npm_err"); then
            status=0
          else
            status=$?
          fi
          err=$(cat "$npm_err"); rm -f "$npm_err"
          if [ "$status" -ne 0 ]; then
            if echo "$err" | grep -qE 'E404|404 Not Found'; then
              npm_v=""
              echo "Drift gate: package not yet on registry — first-publish path"
            else
              echo "::error::Cannot reach npm registry — refuse to publish without a verified registry version. Output: $err"
              exit 1
            fi
          fi
          if [ -z "$npm_v" ]; then
            echo "Drift gate passed: first publish of @c9up/atlas (local $local_v)"
            exit 0
          fi
          highest=$(printf '%s\n%s\n' "$npm_v" "$local_v" | sort -V | tail -1)
          if [ "$local_v" = "$npm_v" ]; then
            if [ "$CONFIRM_OVERWRITE" != "YES" ]; then
              echo "::error::Local version $local_v already published — bump package.json or re-run with confirm_overwrite=YES (rollback path)"
              exit 1
            fi
            echo "Override accepted: republishing $local_v over registry $npm_v"
          elif [ "$highest" = "$npm_v" ]; then
            if [ "$CONFIRM_OVERWRITE" != "YES" ]; then
              echo "::error::Registry version $npm_v is newer than local $local_v — refuse to roll back without confirm_overwrite=YES"
              exit 1
            fi
            echo "Override accepted: rolling back from $npm_v to $local_v"
          else
            echo "Drift gate passed: local $local_v > registry $npm_v"
          fi

      - run: pnpm install
      - uses: actions/download-artifact@v7
        with:
          pattern: atlas-napi-*
          merge-multiple: true
      - run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
